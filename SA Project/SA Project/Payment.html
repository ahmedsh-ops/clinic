<!DOCTYPE html>
<html lang="EN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment process</title>
    <link rel="stylesheet" href="Payment.css">
</head>

<body>
    <div class="payment-container">
        <h1>Payment process</h1>
        <p>Choose a payment method</p>

        <form class="payment-form" id="paymentForm">

            <div class="order-summary">
                <h2>Payment Summary</h2>
                <div class="summary-item total">
                    <span>Total amount:</span>
                    <span class="price">200</span>
                </div>
            </div>

            <hr>

            <div class="payment-method-selection">
                <label class="method-label">
                    <input type="radio" name="payment-method" value="cash" checked>
                    <span>Cash</span>
                </label>

                <label class="method-label">
                    <input type="radio" name="payment-method" value="card">
                    <span>Credited card</span>
                </label>
            </div>

            <div id="card-details" class="card-details-section">

                <div class="form-group">
                    <label for="card-number">رقم البطاقة:</label>
                    <input type="text" id="card-number" name="card-number" placeholder="0000 0000 0000 0000"
                        maxlength="16">
                </div>

                <div class="form-row">
                    <div class="form-group expiry-group">
                        <label for="expiry-date">تاريخ الانتهاء (شهر/سنة):</label>
                        <input type="text" id="expiry-date" name="expiry-date" placeholder="MM/YY" maxlength="5">
                    </div>

                    <div class="form-group cvv-group">
                        <label for="cvv">رمز التحقق (CVV):</label>
                        <input type="text" id="cvv" name="cvv" placeholder="123" maxlength="3">
                    </div>
                </div>

                <div class="form-group">
                    <label for="card-holder">اسم حامل البطاقة:</label>
                    <input type="text" id="card-holder" name="card-holder">
                </div>

            </div>

            <button type="submit" class="pay-btn">Payment confirmation</button>
        </form>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const cardDetails = document.getElementById('card-details');
            const paymentMethods = document.querySelectorAll('input[name="payment-method"]');
            const paymentForm = document.getElementById('paymentForm'); // 1. الحصول على نموذج الدفع

            function toggleCardDetails() {
                // عرض تفاصيل البطاقة إذا كان الخيار "card"، وإخفائها إذا كان "cash"
                if (document.querySelector('input[name="payment-method"]:checked').value === 'card') {
                    cardDetails.style.display = 'block';
                } else {
                    cardDetails.style.display = 'none';
                }
            }

            // إخفاء التفاصيل في البداية (لأن Cash هو الخيار الافتراضي)
            toggleCardDetails();

            // إضافة مستمعي الأحداث عند تغيير الاختيار
            paymentMethods.forEach(radio => {
                radio.addEventListener('change', toggleCardDetails);
            });

            // 2. إضافة مستمع لحدث إرسال النموذج (Submit)
            if (paymentForm) {
                paymentForm.addEventListener('submit', (event) => {
                    event.preventDefault(); // منع الإرسال الافتراضي للنموذج (الذي يسبب إعادة تحميل الصفحة)

                    // *** محاكاة نجاح عملية الدفع ***
                    // بما أن الدفع قد تم بنجاح، يجب أن نفعّل زر 'معلومات الحجز' في الصفحة الرئيسية
                    localStorage.setItem('hasAppointment', 'true');

                    alert('تم تأكيد الدفع بنجاح! سيتم توجيهك إلى الصفحة الرئيسية.');

                    // الانتقال إلى الصفحة الرئيسية
                    window.location.href = 'Home.html';
                });
            }
        });
    </script>
</body>

</html>
