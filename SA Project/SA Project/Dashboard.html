<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking status</title>

    <style>
        * {
    margin: 0;
    padding: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    font-style: italic;
}
        body {
            font-family: Arial, sans-serif;
            background-color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .dashboard-container {
            max-width: 800px;
            margin: 40px auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .welcome {
            width: 94%;
            top: 0;
            padding: 15px 50px;
            position: absolute;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #adcfe4;
            z-index: 991;
        }

        .logo {
            font-size: 50px;
        }

        .logo a {
            text-decoration: none;
            color: #adcfe4;
        }

        .welcome button {
            width: 100px;
            font-size: 15px;
            padding: 10px 10px 10px 10px;
            background-color: #274c74;
            color: #ffffff;
            border: none;
            font-weight: bold;
            cursor: pointer;
            border-radius: 50rem;
        }

        .welcome button:hover {
            background-color: #274c74e1;
            color: #ffffff;
            border: none;
        }

        h1 {
            color: #274c74;
            text-align: center;
            margin-bottom: 30px;
        }

        .appointment-details p {
            font-size: 1.1em;
            margin: 10px 0;
            padding-bottom: 5px;
            border-bottom: 1px dashed #eee;
        }

        .appointment-details span {
            font-weight: bold;
            color: #4a4a4a;
        }

        .action-buttons {
            display: flex;
            gap: 15px;
            margin-top: 30px;
            justify-content: center;
        }

        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            transition: background-color 0.3s ease;
        }

        .edit-btn {
            background-color: #ffc107;
            color: #333;
        }

        .edit-btn:hover {
            background-color: #e0a800;
        }

        .delete-btn {
            background-color: #dc3545;
            color: white;
        }

        .delete-btn:hover {
            background-color: #c82333;
        }

        .go-home-btn {
            background-color: #28a745;
            color: white;
            text-decoration: none;
            text-align: center;
            line-height: 2;
            display: block;
            margin-top: 20px;
        }

        .go-home-btn:hover {
            background-color: #218838;
        }

        /* تنسيق نموذج التعديل */
        #edit-form {
            background-color: #f9f9f9;
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
            border: 1px solid #ddd;
        }

        #edit-form input,
        #edit-form select {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }

        #edit-form button[type="submit"] {
            background-color: #274c74;
            color: white;
            width: 100%;
            margin-top: 10px;
        }

        #edit-form button[type="submit"]:hover {
            background-color: #1e3a5a;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>

<body>
    <div id="welcome" class="welcome">
        <div class="logo"><a id="logo" href="Home.html">PureSmile</a></div>
        <button>About</button>
    </div>
    <div class="dashboard-container">
        <h1>Control panel and appointments</h1>

        <div id="appointment-display" class="appointment-details">
            <h2>Your booked appointment</h2>
            <p>Name: <span id="display-name"></span></p>
            <p>Age: <span id="display-age"></span></p>
            <p>Specialization: <span id="display-specialty"></span></p>
            <p>Doctor: <span id="display-doctor"></span></p>
            <p>Date: <span id="display-date"></span></p>
            <p>Time: <span id="display-time"></span></p>

            <div class="action-buttons">
                <button id="editBtn" class="btn edit-btn">Appointment change</button>
                <button id="deleteBtn" class="btn delete-btn">Cancel appointment</button>
            </div>
        </div>

        <form id="edit-form" class="hidden">
            <h2>Update</h2>
            <div class="form-group">
                <label for="edit-name">Full name:</label>
                <input type="text" id="edit-name" name="name" required>
            </div>
            <div class="form-group">
                <label for="edit-age">Age:</label>
                <input type="number" id="edit-age" name="age" min="1" max="120" required>
            </div>

            <div class="form-group">
                <label for="edit-specialty">Specialization:</label>
                <select id="edit-specialty" name="specialty" required>
                    <option value="الأسنان">الأسنان</option>
                    <option value="الجلدية">الجلدية</option>
                    <option value="الباطنية">الباطنية</option>
                    <option value="الأطفال">الأطفال</option>
                </select>
            </div>
            <div class="form-group">
                <label for="edit-doctor">Doctor:</label>
                <select id="edit-doctor" name="doctor" required>
                    <option value="Dr. Ahmed Khaled">Dr. Ahmed Khaled</option>
                    <option value="Dr. Fatima Saeed">Dr. Fatima Saeed</option>
                    <option value="Dr. Muhammad Ali">Dr. Muhammad Ali</option>
                    <option value="Dr. Noura Fahd">Dr. Noura Fahd</option>
                </select>
            </div>
            <div class="form-group">
                <label for="edit-date">Choose the date:</label>
                <input type="date" id="edit-date" name="date" required>
            </div>
            <div class="form-group">
                <label for="edit-time">Choose the time:</label>
                <input type="time" id="edit-time" name="time" required>
            </div>
            <button type="submit" class="btn">Save changes</button>
            <button type="button" id="cancelEditBtn" class="btn delete-btn">Cancel</button>
        </form>

        <a href="Home.html" class="btn go-home-btn">Return to homepage</a>

    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const displaySection = document.getElementById('appointment-display');
            const editForm = document.getElementById('edit-form');
            const editBtn = document.getElementById('editBtn');
            const deleteBtn = document.getElementById('deleteBtn');
            const cancelEditBtn = document.getElementById('cancelEditBtn');

            // 1. استرجاع وعرض البيانات
            function loadAppointment() {
                const storedData = localStorage.getItem('userAppointment');

                if (storedData) {
                    const appointment = JSON.parse(storedData);

                    displaySection.classList.remove('hidden');
                    editForm.classList.add('hidden');

                    // عرض البيانات الحالية (بما في ذلك الجديدة)
                    document.getElementById('display-name').textContent = appointment.name;
                    document.getElementById('display-age').textContent = appointment.age;
                    document.getElementById('display-specialty').textContent = appointment.specialty;
                    document.getElementById('display-doctor').textContent = appointment.doctor;
                    document.getElementById('display-date').textContent = appointment.date;
                    document.getElementById('display-time').textContent = appointment.time;

                    // ملء نموذج التعديل بالبيانات الحالية (بما في ذلك الجديدة)
                    document.getElementById('edit-name').value = appointment.name;
                    document.getElementById('edit-age').value = appointment.age;
                    document.getElementById('edit-specialty').value = appointment.specialty;
                    document.getElementById('edit-doctor').value = appointment.doctor;
                    document.getElementById('edit-date').value = appointment.date;
                    document.getElementById('edit-time').value = appointment.time;

                } else {
                    // إذا لم يكن هناك موعد محجوز
                    displaySection.innerHTML = '<h2>لا يوجد لديك موعد محجوز حاليًا.</h2>';
                    editForm.classList.add('hidden');
                    const actionButtons = document.querySelector('.action-buttons');
                    if (actionButtons) actionButtons.classList.add('hidden');
                }
            }

            // تحميل الموعد عند بدء تشغيل الصفحة
            loadAppointment();

            // 2. وظيفة التعديل: عرض النموذج
            if (editBtn) {
                editBtn.addEventListener('click', () => {
                    displaySection.classList.add('hidden');
                    editForm.classList.remove('hidden');
                });
            }

            // 3. وظيفة التعديل: إخفاء النموذج (إلغاء)
            if (cancelEditBtn) {
                cancelEditBtn.addEventListener('click', () => {
                    loadAppointment();
                });
            }

            // 4. وظيفة التعديل: حفظ البيانات الجديدة
            editForm.addEventListener('submit', (event) => {
                event.preventDefault();

                // جمع البيانات المعدلة (بما في ذلك الجديدة)
                const updatedAppointmentData = {
                    name: document.getElementById('edit-name').value,
                    age: document.getElementById('edit-age').value,
                    specialty: document.getElementById('edit-specialty').value,
                    doctor: document.getElementById('edit-doctor').value,
                    date: document.getElementById('edit-date').value,
                    time: document.getElementById('edit-time').value
                };

                // حفظ البيانات المعدلة في localStorage
                localStorage.setItem('userAppointment', JSON.stringify(updatedAppointmentData));

                alert('تم حفظ التعديلات بنجاح! ✅');

                // إعادة تحميل العرض
                loadAppointment();
            });


            // 5. وظيفة الحذف
            if (deleteBtn) {
                deleteBtn.addEventListener('click', () => {
                    if (confirm('هل أنت متأكد من رغبتك في حذف الموعد؟ لا يمكن التراجع عن هذا الإجراء.')) {
                        localStorage.removeItem('userAppointment');
                        localStorage.removeItem('hasAppointment');

                        alert('تم حذف الموعد بنجاح. سيتم الآن توجيهك إلى الصفحة الرئيسية.');

                        window.location.href = 'Home.html';
                    }
                });
            }

        });
    </script>
</body>

</html>
