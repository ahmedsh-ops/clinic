<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Status - PureSmile</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="Home.css">
    <style>
        .dashboard-container {
            padding-top: 120px;
            padding-bottom: 60px;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            min-height: calc(100vh - 120px);
        }

        .dashboard-card {
            background: var(--white);
            padding: 50px;
            border-radius: var(--radius);
            box-shadow: var(--shadow-lg);
            width: 100%;
            max-width: 800px;
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        .dashboard-card h1 {
            font-size: 2.2rem;
            color: var(--dark);
            margin-bottom: 30px;
            text-align: center;
        }

        .appointment-details {
            background: var(--primary-lightest);
            padding: 30px;
            border-radius: var(--radius);
            margin-bottom: 30px;
            border: 1px solid rgba(59, 130, 246, 0.2);
        }

        .appointment-details h2 {
            font-size: 1.3rem;
            color: var(--primary);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px dashed rgba(59, 130, 246, 0.3);
            font-size: 1.05rem;
        }

        .detail-row:last-child {
            border-bottom: none;
        }

        .detail-row .label {
            color: var(--text);
            font-weight: 500;
        }

        .detail-row .value {
            color: var(--dark);
            font-weight: 600;
        }

        .action-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
        }

        .edit-btn {
            background-color: var(--primary-light);
            color: var(--white);
        }

        .edit-btn:hover {
            background-color: var(--primary);
        }

        .delete-btn {
            background-color: #ef4444;
            color: var(--white);
        }

        .delete-btn:hover {
            background-color: #dc2626;
        }

        /* Edit Form */
        #edit-form {
            background: var(--light);
            padding: 30px;
            border-radius: var(--radius);
            margin-top: 20px;
            border: 1px solid #e5e7eb;
            animation: fadeIn 0.4s;
        }

        #edit-form h2 {
            font-size: 1.5rem;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            margin-bottom: 5px;
            font-weight: 600;
            font-size: 0.95rem;
        }

        .form-group input,
        .form-group select {
            padding: 12px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            font-family: inherit;
        }

        .form-group input:focus,
        .form-group select:focus {
            border-color: var(--primary-light);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .form-actions {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }

        .go-home-btn {
            display: block;
            text-align: center;
            margin-top: 30px;
            color: var(--primary);
            font-weight: 600;
            text-decoration: none;
        }

        .go-home-btn:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body class="bg-light">

    <!-- Navbar -->
    <header class="main-header">
        <div class="logo">
            <a href="Home.html" style="text-decoration:none; color:inherit;"><i class="fa-solid fa-tooth"></i>
                PureSmile</a>
        </div>
    </header>

    <div class="dashboard-container">
        <div class="dashboard-card">
            <h1>Patient Dashboard</h1>

            <div id="appointment-display">
                <div class="appointment-details">
                    <h2><i class="fa-solid fa-calendar-check"></i> Booked Appointment</h2>
                    <div class="detail-row">
                        <span class="label">Patient Name</span>
                        <span class="value" id="display-name"></span>
                    </div>
                    <div class="detail-row">
                        <span class="label">Age</span>
                        <span class="value" id="display-age"></span>
                    </div>
                    <div class="detail-row">
                        <span class="label">Department</span>
                        <span class="value" id="display-specialty"></span>
                    </div>
                    <div class="detail-row">
                        <span class="label">Doctor</span>
                        <span class="value" id="display-doctor"></span>
                    </div>
                    <div class="detail-row">
                        <span class="label">Date</span>
                        <span class="value" id="display-date"></span>
                    </div>
                    <div class="detail-row">
                        <span class="label">Time</span>
                        <span class="value" id="display-time"></span>
                    </div>
                </div>

                <div class="action-buttons">
                    <button id="editBtn" class="btn edit-btn"><i class="fa-solid fa-pen-to-square"></i> Modify</button>
                    <button id="deleteBtn" class="btn delete-btn"><i class="fa-solid fa-trash-can"></i> Cancel</button>
                </div>
            </div>

            <form id="edit-form" class="hidden">
                <h2>Update Details</h2>
                <div style="display:flex; gap:15px;">
                    <div class="form-group" style="flex:1;">
                        <label for="edit-name">Full Name:</label>
                        <input type="text" id="edit-name" name="name" required>
                    </div>
                    <div class="form-group" style="flex:1;">
                        <label for="edit-age">Age:</label>
                        <input type="number" id="edit-age" name="age" min="1" max="120" required>
                    </div>
                </div>

                <div style="display:flex; gap:15px;">
                    <div class="form-group" style="flex:1;">
                        <label for="edit-specialty">Department:</label>
                        <select id="edit-specialty" name="specialty" required>
                            <option value="Dental">Dental Care</option>
                            <option value="Dermatology">Dermatology</option>
                            <option value="Internal Medicine">Internal Medicine</option>
                            <option value="Pediatrics">Pediatrics</option>
                        </select>
                    </div>
                    <div class="form-group" style="flex:1;">
                        <label for="edit-doctor">Doctor:</label>
                        <select id="edit-doctor" name="doctor" required>
                            <option value="Dr. Ahmed Khaled">Dr. Ahmed Khaled</option>
                            <option value="Dr. Fatima Saeed">Dr. Fatima Saeed</option>
                            <option value="Dr. Muhammad Ali">Dr. Muhammad Ali</option>
                            <option value="Dr. Noura Fahd">Dr. Noura Fahd</option>
                        </select>
                    </div>
                </div>

                <div style="display:flex; gap:15px;">
                    <div class="form-group" style="flex:1;">
                        <label for="edit-date">Date:</label>
                        <input type="date" id="edit-date" name="date" required>
                    </div>
                    <div class="form-group" style="flex:1;">
                        <label for="edit-time">Time:</label>
                        <input type="time" id="edit-time" name="time" required>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn primary-btn" style="flex:1;"><i
                            class="fa-solid fa-floppy-disk"></i> Save changes</button>
                    <button type="button" id="cancelEditBtn" class="btn delete-btn" style="flex:1;">Discard</button>
                </div>
            </form>

            <a href="Home.html" class="go-home-btn"><i class="fa-solid fa-arrow-left"></i> Return to Homepage</a>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const isLoggedIn = localStorage.getItem('loggedIn') === 'true';
            if (!isLoggedIn) {
                window.location.href = 'login.html';
            }

            const displaySection = document.getElementById('appointment-display');
            const editForm = document.getElementById('edit-form');
            const editBtn = document.getElementById('editBtn');
            const deleteBtn = document.getElementById('deleteBtn');
            const cancelEditBtn = document.getElementById('cancelEditBtn');

            function loadAppointment() {
                const storedData = localStorage.getItem('userAppointment');

                if (storedData) {
                    const appointment = JSON.parse(storedData);
                    displaySection.classList.remove('hidden');
                    editForm.classList.add('hidden');

                    document.getElementById('display-name').textContent = appointment.name;
                    document.getElementById('display-age').textContent = appointment.age;
                    document.getElementById('display-specialty').textContent = appointment.specialty;
                    document.getElementById('display-doctor').textContent = appointment.doctor;
                    document.getElementById('display-date').textContent = appointment.date;
                    document.getElementById('display-time').textContent = appointment.time;

                    document.getElementById('edit-name').value = appointment.name;
                    document.getElementById('edit-age').value = appointment.age;
                    document.getElementById('edit-specialty').value = appointment.specialty;
                    document.getElementById('edit-doctor').value = appointment.doctor;
                    document.getElementById('edit-date').value = appointment.date;
                    document.getElementById('edit-time').value = appointment.time;

                } else {
                    displaySection.innerHTML = '<div style="text-align:center; padding: 40px;"><i class="fa-regular fa-calendar-xmark" style="font-size:3rem; color:#d1d5db; margin-bottom:20px;"></i><h2>You have no upcoming appointments.</h2><a href="Book.html" class="btn primary-btn" style="margin-top:20px;">Book Now</a></div>';
                    editForm.classList.add('hidden');
                }
            }

            loadAppointment();

            if (editBtn) {
                editBtn.addEventListener('click', () => {
                    displaySection.classList.add('hidden');
                    editForm.classList.remove('hidden');
                });
            }

            if (cancelEditBtn) {
                cancelEditBtn.addEventListener('click', () => {
                    loadAppointment();
                });
            }

            editForm.addEventListener('submit', (event) => {
                event.preventDefault();

                const updatedAppointmentData = {
                    name: document.getElementById('edit-name').value,
                    age: document.getElementById('edit-age').value,
                    specialty: document.getElementById('edit-specialty').value,
                    doctor: document.getElementById('edit-doctor').value,
                    date: document.getElementById('edit-date').value,
                    time: document.getElementById('edit-time').value
                };

                localStorage.setItem('userAppointment', JSON.stringify(updatedAppointmentData));
                alert('Changes saved successfully! ✅');
                loadAppointment();
            });


            if (deleteBtn) {
                deleteBtn.addEventListener('click', () => {
                    if (confirm('Are you sure you want to cancel your appointment? This action cannot be undone.')) {
                        localStorage.removeItem('userAppointment');
                        localStorage.removeItem('hasAppointment');
                        alert('Appointment canceled. Redirecting to home...');
                        window.location.href = 'Home.html';
                    }
                });
            }
        });
    </script>
</body>

</html>
