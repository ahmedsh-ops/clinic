<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Medical Clinic</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="Home.css">
</head>

<body>
    <header class="main-header">
        <div class="logo">PureSmile</div>

        <div class="auth-buttons">
            <a href="login.html" class="btn login-btn">Login</a>

            <a href="Dashboard.html" id="booking-info-btn" class="btn booking-info-btn hidden">Booking information</a>
        </div>
    </header>

    <main class="hero-section">
        <div class="hero-content">
            <h1>Reliable healthcare to book your appointment</h1>
            <p>Start your journey to better health by booking your appointment</p>

            <div class="action-buttons">
                <a href="Book.html" id="bookNowBtn" class="btn primary-btn">Book now</a>
            </div>
        </div>
        <div class="image-gallery">
            <div class="image-placeholder main-image">
                <img src="Reception.jpg" alt="صورة" loading="lazy">
            </div>
            <div class="image-placeholder side-image">
                <img src="OuCFO19BN0GpeUjuJYpUveL18w.png" alt="صورة" loading="lazy">
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="a3">
            <div class="name1">
                <div class="logo">PureSmile</div>
            </div>

            <div class="footer-links">
                <div class="footer-column">
                    <h4>Pages</h4>
                    <a href="#home">Home</a>
                    <a href="#">About</a>
                    <a href="#">Contact</a>
                </div>
                <div class="footer-column">
                    <h4>CMS</h4>
                    <a href="#">Work</a>
                    <a href="#">Work Single</a>
                    <a href="#">Blog</a>
                    <a href="#"><strong>Blog Single</strong></a>
                </div>
                <div class="footer-column">
                    <h4>Utility</h4>
                    <a href="#">404</a>
                    <a href="#">Licensing</a>
                    <div class="social">
                        <ul>
                            <li><a href="#"><i class="fa-brands fa-facebook"></i></a></li>
                            <li><a href="#"><i class="fa-brands fa-instagram"></i></a></li>
                            <li><a href="#"><i class="fa-brands fa-twitter"></i></a></li>
                            <li><a href="#"><i class="fab fa-github"></i></a></li>
                        </ul>
                    </div>
                </div>
            </div>

    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const bookingInfoBtn = document.getElementById('booking-info-btn');
            const loginBtn = document.querySelector('.login-btn');
            const bookNowBtn = document.getElementById('bookNowBtn'); // <-- زر الحجز

            // 1. التحقق من حالة الدخول
            const isLoggedIn = localStorage.getItem('loggedIn') === 'true';
            const hasAppointment = localStorage.getItem('hasAppointment');

            // 2. تحديث حالة زر "معلومات الحجز"
            if (hasAppointment === 'true') {
                bookingInfoBtn.classList.remove('hidden');
            } else {
                bookingInfoBtn.classList.add('hidden');
            }

            // 3. تحديث زر تسجيل الدخول / تسجيل الخروج
            if (isLoggedIn) {
                loginBtn.textContent = 'Log out';
                loginBtn.href = '#';
                loginBtn.classList.add('logout-btn');

                loginBtn.addEventListener('click', (event) => {
                    event.preventDefault();
                    localStorage.removeItem('loggedIn');
                    localStorage.removeItem('currentUser');
                    localStorage.removeItem('hasAppointment');
                    // إعادة التوجيه إلى صفحة تسجيل الدخول
                    window.location.href = 'login.html';
                });
            }

            // 4. المنطق الجديد: منع الحجز قبل تسجيل الدخول
            if (bookNowBtn) {
                bookNowBtn.addEventListener('click', (event) => {
                    if (!isLoggedIn) {
                        event.preventDefault(); // منع الانتقال الافتراضي إلى Book.html
                        alert('يجب عليك تسجيل الدخول أولاً لحجز موعدك.'); // رسالة توضيحية
                        window.location.href = 'login.html'; // توجيه المستخدم لصفحة تسجيل الدخول
                    }
                    // إذا كان مسجلاً للدخول، لن يتم استدعاء preventDefault وسيتم الانتقال إلى Book.html بشكل طبيعي
                });
            }
        });
    </script>
</body>

</html>
