<!DOCTYPE html>
<html lang="en">

<head>
    <title>Login</title>
    <link rel="icon" href="/images/logo2.png" type="image/x-icon">
    <link rel="stylesheet" href="StylesLogin.css">
    <link rel="stylesheet" href="/css/styles.css">
</head>

<body>
    <a href="Home.html" class="home-button">
        <i class="fas fa-home"></i>
    </a>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <div class="div1">
        <div class="main">
            <input type="checkbox" id="chk">

            <div class="signup">
                <h2>Create Account</h2>
                <form>

                    <label for="Username">Username</label>
                    <input id="Username" type="text" placeholder="Username" required>

                    <label for="email">Email</label>
                    <input id="email" type="email" placeholder="Email" required>

                    <Label for="number">Mobile Phone</Label>
                    <input id="number" type="number" placeholder="Mobile Phone" required>

                    <label for="password">Password</label>
                    <input id="password" type="password" placeholder="Password" required>
                    <button>Sign up</button>
                </form>
            </div>

            <div class="login">
                <form>
                    <label class="StyleLogin" for="chk">Login</label>
                    <input type="email" placeholder="Email" required="">
                    <input type="password" placeholder="Password" required="">
                    <button>Login</button>
                </form>
            </div>
        </div>
    </div>


    <div id="div2" class="div2 div3action2"></div>

    <script src="login.js"></script>
</body>

</html>
