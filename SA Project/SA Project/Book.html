<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking</title>
    <link rel="stylesheet" href="Book.css">
</head>
<body>
    <div id="welcome" class="welcome">
        <div class="logo" ><a  id="logo" href="Home.html">PureSmile</a></div>
        <button>About</button>
    </div>
    <div class="appointment-container">
        <h1>Book an appointment</h1>
        <p>Please fill in the following information to confirm your appointment.</p>

        <form class="appointment-form" action="Payment.html">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" required>
            </div>

            <div class="form-group">
                <label for="age">Age</label>
                <input type="number" id="age" name="age" min="1" max="120" required>
            </div>

            <div class="form-group">
                <label for="specialty">Choose a major</label>
                <select id="specialty" name="specialty" required>
                    <option value="" disabled selected></option>
                    <option value="الأسنان">الأسنان</option>
                    <option value="الجلدية">الجلدية</option>
                    <option value="الباطنية">الباطنية</option>
                    <option value="الأطفال">الأطفال</option>
                </select>
            </div>

            <div class="form-group">
                <label for="doctor">Choose a doctor</label>
                <select id="doctor" name="doctor" required>
                    <option value="" disabled selected></option>
                    <option value="Dr. Ahmed Khaled">Dr. Ahmed Khaled</option>
                    <option value="Dr. Fatima Saeed">Dr. Fatima Saeed</option>
                    <option value="Dr. Muhammad Ali">Dr. Muhammad Ali</option>
                    <option value="Dr. Noura Fahd">Dr. Noura Fahd</option>
                </select>
            </div>
            <div class="form-group">
                <label for="date">Choose a date</label>
                <input type="date" id="date" name="date" required>
            </div>

            <div class="form-group">
                <label for="time">Choose the time</label>
                <input type="time" id="time" name="time" required>
            </div>

            <button type="submit" class="submit-btn">Booking confirmation</button>
        </form>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.querySelector('.appointment-form');

            form.addEventListener('submit', (event) => {
                event.preventDefault(); // منع الإرسال الافتراضي إلى Payment.html

                // 1. جمع بيانات الحجز من حقول النموذج (بما في ذلك الحقول الجديدة)
                const appointmentData = {
                    name: document.getElementById('name').value,
                    age: document.getElementById('age').value,
                    specialty: document.getElementById('specialty').value, 
                    doctor: document.getElementById('doctor').value,       
                    date: document.getElementById('date').value,
                    time: document.getElementById('time').value
                };

                // 2. حفظ البيانات في مخزن المتصفح (localStorage)
                localStorage.setItem('userAppointment', JSON.stringify(appointmentData));

                // 3. التوجيه إلى صفحة الدفع للمتابعة
                window.location.href = 'Payment.html';
            });
        });
    </script>

</body>
</html>
