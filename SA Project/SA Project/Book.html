<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Appointment - PureSmile</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="Home.css">
    <link rel="stylesheet" href="Book.css">
</head>
<body class="bg-light">
    <!-- Navbar -->
    <header class="main-header">
        <div class="logo">
            <a href="Home.html" style="text-decoration:none; color:inherit;"><i class="fa-solid fa-tooth"></i> PureSmile</a>
        </div>
        <div class="auth-buttons">
            <a href="Dashboard.html" id="booking-info-btn" class="btn booking-info-btn">Dashboard</a>
        </div>
    </header>

    <div class="appointment-container">
        <div class="form-card">
            <h1>Book an Appointment</h1>
            <p>Please fill in the following information to schedule your visit.</p>

            <form class="appointment-form" id="booking-form">
                <div class="form-row">
                    <div class="form-group">
                        <label for="name">Full Name</label>
                        <input type="text" id="name" name="name" placeholder="John Doe" required>
                    </div>
                    <div class="form-group">
                        <label for="age">Age</label>
                        <input type="number" id="age" name="age" min="1" max="120" placeholder="e.g. 30" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="specialty">Department</label>
                        <select id="specialty" name="specialty" required>
                            <option value="" disabled selected>Select department</option>
                            <option value="Dental">Dental Care</option>
                            <option value="Dermatology">Dermatology</option>
                            <option value="Internal Medicine">Internal Medicine</option>
                            <option value="Pediatrics">Pediatrics</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="doctor">Doctor</label>
                        <select id="doctor" name="doctor" required>
                            <option value="" disabled selected>Select doctor</option>
                            <option value="Dr. Ahmed Khaled">Dr. Ahmed Khaled</option>
                            <option value="Dr. Fatima Saeed">Dr. Fatima Saeed</option>
                            <option value="Dr. Muhammad Ali">Dr. Muhammad Ali</option>
                            <option value="Dr. Noura Fahd">Dr. Noura Fahd</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="date">Date</label>
                        <input type="date" id="date" name="date" required>
                    </div>
                    <div class="form-group">
                        <label for="time">Time</label>
                        <input type="time" id="time" name="time" required>
                    </div>
                </div>

                <button type="submit" class="submit-btn btn primary-btn">Proceed to Payment <i class="fa-solid fa-credit-card"></i></button>
            </form>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
             // Redirect if not logged in
             const isLoggedIn = localStorage.getItem('loggedIn') === 'true';
             if (!isLoggedIn) {
                 alert('You must log in first to book an appointment.');
                 window.location.href = 'login.html';
             }

            const form = document.getElementById('booking-form');

            form.addEventListener('submit', (event) => {
                event.preventDefault(); 

                const appointmentData = {
                    name: document.getElementById('name').value,
                    age: document.getElementById('age').value,
                    specialty: document.getElementById('specialty').value, 
                    doctor: document.getElementById('doctor').value,       
                    date: document.getElementById('date').value,
                    time: document.getElementById('time').value
                };

                localStorage.setItem('userAppointment', JSON.stringify(appointmentData));

                window.location.href = 'Payment.html';
            });
            
            // Set min date to today
            const dateInput = document.getElementById('date');
            const today = new Date().toISOString().split('T')[0];
            dateInput.setAttribute('min', today);
        });
    </script>
</body>
</html>
